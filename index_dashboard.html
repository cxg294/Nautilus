    --accent-violet: #8b5cf6;

    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Top Bar: SKU Switcher ── */

    position: sticky; top: 0; z-index: 200;
    backdrop-filter: blur(24px) saturate(180%);
    background: rgba(10,14,26,0.92);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex; align-items: stretch; gap: 0;
    height: 52px;
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 10px;
    padding-right: 28px;
    border-right: 1px solid var(--border);
    margin-right: 4px;
    font-size: 15px; font-weight: 700;
    background: var(--gradient-blue);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .sku-tab {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 0 18px;
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .sku-tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.02); }
  .sku-tab.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }
  .sku-tab .sku-dot { width: 6px; height: 6px; border-radius: 50%; }
  .sku-tab:nth-child(2) .sku-dot { background: var(--accent-cyan); }
  .sku-tab:nth-child(3) .sku-dot { background: var(--accent-amber); }
  .sku-tab:nth-child(4) .sku-dot { background: var(--accent-emerald); }
  .sku-tab:nth-child(5) .sku-dot { background: var(--accent-violet); }
  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 16px;
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .compare-btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 11px; font-weight: 500;
    padding: 5px 14px;
    background: rgba(139,92,246,0.12);
    border: 1px solid rgba(139,92,246,0.3);
    border-radius: 6px;
    color: var(--accent-violet);
    cursor: pointer;
    transition: all 0.2s;
  }
  .compare-btn:hover { background: rgba(139,92,246,0.2); }
  .compare-btn.active { background: var(--accent-violet); color: #fff; border-color: var(--accent-violet); }

  /* ── KPI Strip ── */
  .kpi-strip {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; padding: 24px 40px;
  }
  .kpi-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    display: flex; flex-direction: column; gap: 8px;
    transition: all 0.3s; cursor: pointer;
    position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; border-radius: var(--radius) var(--radius) 0 0;
  }
  .kpi-card:nth-child(1)::before { background: var(--gradient-blue); }
  .kpi-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent-emerald), var(--accent-cyan)); }
  .kpi-card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent-amber), var(--accent-rose)); }
  .kpi-card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent-violet), var(--accent-blue)); }
  .kpi-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .kpi-card.active { border-color: var(--accent-blue); box-shadow: 0 0 0 1px var(--accent-blue), var(--shadow-lg); }
  .kpi-label { font-size: 12px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; }
  .kpi-value { font-size: 28px; font-weight: 900; font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; }
  .kpi-sub { font-size: 12px; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; }
  .kpi-sub span { display: flex; align-items: center; gap: 4px; }

  /* ── Tab Nav ── */
  .tab-nav {
    display: flex; gap: 4px; padding: 0 40px; margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 10px 20px; background: transparent;
    color: var(--text-muted); border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
  }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }

  /* ── Main ── */
  .main { padding: 20px 40px 40px; display: flex; flex-direction: column; gap: 24px; }

  .panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px;
    box-shadow: var(--shadow-lg);

  .chart-container { width: 100%; height: 440px; }

  .insight-card {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);

  .insight-card .ic-note { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

    font-size: 11px; color: var(--text-muted);
    border-top: 1px solid var(--border);

    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    .insight-grid { grid-template-columns: 1fr; }
    .topbar, .kpi-strip, .main, .tab-nav { padding-left: 20px; padding-right: 20px; }

// ══════════════════════════════════════════════════════════════
//  ANALYSIS ENGINE
// ══════════════════════════════════════════════════════════════
const TYPE_LABELS = { VIDEO: '视频', EXAM: '问答', PROJECT: '关卡' };
const TYPE_COLORS = { VIDEO: '#3b82f6', EXAM: '#f59e0b', PROJECT: '#f43f5e' };

function normalize(raw) {
  return raw.map(ch => ({ chapterName: ch.n, contentType: ch.t, arrive: ch.a, finish: ch.f }));
}

function enrichCourse(rawCourse, lessonKey) {
  const chapters = normalize(rawCourse.chapters).map((ch, i, arr) => {
    const loss = ch.arrive - ch.finish;
    const rate = ch.arrive > 0 ? +((loss / ch.arrive) * 100).toFixed(2) : 0;
    const cumRet = arr[0].arrive > 0 ? +((ch.finish / arr[0].arrive) * 100).toFixed(2) : 100;
    // 内容分类：剧情 / 讲解视频 / 练习题 / 关卡 / 总结
    let category = 'lecture'; // 讲解视频
    if (ch.chapterName.includes('剧情')) category = 'drama';
    else if (ch.chapterName === '总结') category = 'summary';
    else if (ch.contentType === 'EXAM') category = 'quiz';
    else if (ch.contentType === 'PROJECT') category = 'project';
    return { ...ch, index: i + 1, lossCount: loss, innerLossRate: rate, cumulativeRetention: cumRet, category };
  });
  // 第4课：最后一个关卡之后的视频环节标记为"销售干扰期"，分析时排除
  if (String(lessonKey) === '4') {
    let lastProjIdx = -1;
    chapters.forEach((ch, i) => { if (ch.contentType === 'PROJECT') lastProjIdx = i; });
    if (lastProjIdx >= 0) {
      chapters.forEach((ch, i) => { if (i > lastProjIdx) ch.salesImpacted = true; });
    }
  }
  const first = chapters[0].arrive;
  const last = chapters[chapters.length - 1].finish;
  // 最高流失环节：排除第4课销售干扰期
  const validForMax = chapters.filter(ch => !ch.salesImpacted);
  const maxCh = validForMax.reduce((m, c) => c.innerLossRate > m.innerLossRate ? c : m, validForMax[0]);
  const projects = chapters.filter(c => c.contentType === 'PROJECT');
  const avgProjLoss = projects.length ? +(projects.reduce((s, p) => s + p.innerLossRate, 0) / projects.length).toFixed(2) : 0;
  const typeStats = {};
  chapters.forEach(ch => {
    if (!typeStats[ch.contentType]) typeStats[ch.contentType] = { count: 0, totalLoss: 0, totalArrive: 0 };
    typeStats[ch.contentType].count++;
    typeStats[ch.contentType].totalLoss += ch.lossCount;
    typeStats[ch.contentType].totalArrive += ch.arrive;
  });
  Object.keys(typeStats).forEach(k => {
    typeStats[k].avgLossRate = typeStats[k].totalArrive > 0
      ? +(typeStats[k].totalLoss / typeStats[k].totalArrive * 100).toFixed(2) : 0;
  });
  // 内容分类统计（剧情/讲解视频/练习题）
  const CAT_KEYS = ['drama','lecture','quiz'];
  const categoryStats = {};
  CAT_KEYS.forEach(cat => {
    const items = chapters.filter(ch => ch.category === cat && !ch.salesImpacted);
    const totalA = items.reduce((s, x) => s + x.arrive, 0);
    const totalL = items.reduce((s, x) => s + x.lossCount, 0);
    categoryStats[cat] = { count: items.length, totalLoss: totalL, totalArrive: totalA,
      avgLossRate: totalA > 0 ? +(totalL / totalA * 100).toFixed(2) : 0 };
  });
  return { courseId: rawCourse.courseId, chapters, firstArrive: first, lastFinish: last,
    overallCompletion: +(last / first * 100).toFixed(2), totalLoss: first - last,
    maxLossChapter: maxCh, typeStats, categoryStats, projects, avgProjectLoss: avgProjLoss };
}

function buildSku(skuCfg) {
  const courses = {};
  Object.keys(skuCfg.courses).forEach(k => { courses[k] = enrichCourse(skuCfg.courses[k], k); });
  return { ...skuCfg, courses };
}

function renderTopbar() {

function renderKPI() {
  const strip = document.getElementById('kpiStrip');

  Object.keys(C()).forEach(k => {

    card.className = 'kpi-card';

function renderTabs() {
  const nav = document.getElementById('tabNav');
  const tabs = [
    { id: 'overview', label: '总览对比' },
    ...Object.keys(C()).map(k => ({ id: 'lesson' + k, label: '第' + k + '课 详情' })),
    { id: 'insights', label: '洞察与建议' },
  ];
  nav.innerHTML = tabs.map(t =>
    `<button class="tab-btn${currentTab === t.id ? ' active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchSku(skuId) {
  activeSku = skuId;
  currentTab = 'overview';
  compareMode = false;
  renderAll();
}

function toggleCompare() {
  compareMode = !compareMode;
  renderTopbar();
  renderContent();
}

function switchTab(tabId) {
  currentTab = tabId;
  renderTabs();
  renderContent();
  document.querySelectorAll('.kpi-card').forEach((card, i) => {
    card.classList.toggle('active', tabId === 'lesson' + (i + 1));
  });
}

function renderContent() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  Object.values(charts).forEach(c => { try { c.dispose(); } catch(e) {} });
  charts = {};

  if (compareMode) { renderCompare(main); return; }
  if (currentTab === 'overview') renderOverview(main);
  else if (currentTab.startsWith('lesson')) renderLesson(main, currentTab.replace('lesson', ''));
  else if (currentTab === 'insights') renderInsights(main);
}

function renderAll() {
  renderTopbar(); renderKPI(); renderTabs(); renderContent();
}

  allAnoms.sort((a,b) => b.innerLossRate - a.innerLossRate);

  if (allAnoms.length) {
    const p4 = mkPanel('全局 TOP 流失节点', '跨四课流失率 > 0.5% 的环节（已排除第4课销售干扰期）', 'var(--accent-rose)');
    let html = '<div class="anomaly-list">';
    allAnoms.slice(0, 8).forEach((a, i) => {
      html += `<div class="anomaly-item">
        <span class="badge">TOP${i+1} · ${a.innerLossRate}% · ${a.lossCount}人</span>
        <span class="a-name">第${a.lesson}课 #${a.index} ${a.chapterName}</span>
        <span style="color:${TYPE_COLORS[a.contentType]};font-size:11px;font-weight:500">${TYPE_LABELS[a.contentType]}</span>
        <span class="a-cause">→ ${guess(a)}</span>
      </div>`;
    });
    html += '</div>';
    p4.innerHTML += html;
    container.appendChild(p4);
  }

  setTimeout(() => { chartBubble(); chartProjComp(); chartCatComp(); }, 60);
}

function chartBubble() {
  const el = document.getElementById('chartBubble'); if (!el) return;
  const ch = echarts.init(el); charts.bubble = ch;
  const lessonColors = { 1: '#3b82f6', 2: '#06b6d4', 3: '#f59e0b', 4: '#8b5cf6' };

  const seriesData = {};
  Object.keys(C()).forEach(k => {
    seriesData[k] = C()[k].chapters.filter(x => x.lossCount > 0 && !x.salesImpacted).map(x => ({
      value: [x.index, x.innerLossRate, x.lossCount, x.chapterName, TYPE_LABELS[x.contentType]],
      symbolSize: Math.max(x.lossCount * 0.6, 8),
    }));
  });

  ch.setOption({
    tooltip: { backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#f1f5f9', fontSize: 12 },
      formatter: p => `<b>第${p.seriesName}课 #${p.value[0]} ${p.value[3]}</b><br/>类型: ${p.value[4]}<br/>流失率: ${p.value[1]}%<br/>流失人数: ${p.value[2]}人` },
    legend: { data: Object.keys(C()).map(k => '第' + k + '课'), textStyle: { color: '#94a3b8' }, top: 4, selectedMode: 'multiple' },
    grid: { left: 60, right: 40, top: 48, bottom: 50 },
    xAxis: { name: '环节序号', type: 'value', min: 0, nameTextStyle: { color: '#64748b' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: { name: '流失率%', type: 'value', nameTextStyle: { color: '#64748b' }, axisLabel: { color: '#94a3b8', formatter: '{value}%' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    series: Object.keys(C()).map(k => ({
      name: '第' + k + '课', type: 'scatter',
      data: seriesData[k],
      itemStyle: { color: lessonColors[k], opacity: 0.7 },
    }))
  }); ch.resize();
}

function chartProjComp() {
  const el = document.getElementById('chartProjComp'); if (!el) return;
  const ch = echarts.init(el); charts.projComp = ch;
  const allProjects = [];
  Object.keys(C()).forEach(k => {
    C()[k].projects.forEach(p => { allProjects.push({ lesson: k, ...p }); });
  });
  const labels = allProjects.map(p => `L${p.lesson}-${p.chapterName.replace('关卡','').replace(/^\d+-/,'')}`);

  ch.setOption({
    tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#f1f5f9' },
      formatter: p => { const x = allProjects[p[0].dataIndex]; return `<b>第${x.lesson}课 ${x.chapterName}</b><br/>流失率: ${x.innerLossRate}%<br/>流失人数: ${x.lossCount}人<br/>到课: ${x.arrive} → 完课: ${x.finish}`; } },
    grid: { left: 60, right: 56, top: 40, bottom: 80 },
    xAxis: { type: 'category', data: labels, axisLabel: { color: '#94a3b8', fontSize: 10, rotate: 35 }, axisLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: [
      { type: 'value', name: '流失率%', axisLabel: { color: '#94a3b8', formatter: '{value}%' }, splitLine: { lineStyle: { color: '#1e293b' } } },
      { type: 'value', name: '流失人数', axisLabel: { color: '#94a3b8' }, splitLine: { show: false } }
    ],
    series: [
      { name: '流失率', type: 'bar', barWidth: 28,
        data: allProjects.map(p => ({ value: p.innerLossRate,
          itemStyle: { color: p.innerLossRate > 1 ? '#f43f5e' : p.innerLossRate > 0.5 ? '#f59e0b' : '#10b981', borderRadius: [4,4,0,0] } })),
        label: { show: true, position: 'top', formatter: p => p.value + '%', color: '#94a3b8', fontSize: 10, fontFamily: 'JetBrains Mono' } },
      { name: '流失人数', type: 'line', yAxisIndex: 1,
        data: allProjects.map(p => p.lossCount),
        lineStyle: { color: '#8b5cf6', width: 2 }, symbol: 'circle', symbolSize: 8, itemStyle: { color: '#8b5cf6' },
        label: { show: true, position: 'top', formatter: p => p.value + '人', color: '#8b5cf6', fontSize: 10 } }
    ]
  }); ch.resize();
}

function chartCatComp() {
  const el = document.getElementById('chartCatComp'); if (!el) return;
  const ch = echarts.init(el); charts.catComp = ch;
  const keys = Object.keys(C());
  const CAT_KEYS = ['drama','lecture','quiz'];
  const CAT_LABELS = { drama: '剧情', lecture: '讲解视频', quiz: '练习题' };
  const CAT_COLORS = { drama: '#8b5cf6', lecture: '#3b82f6', quiz: '#f59e0b' };

  ch.setOption({
    tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#f1f5f9' },
      formatter: params => {
        const lessonK = keys[params[0].dataIndex];
        let html = `<b>第${lessonK}课</b>`;
        params.forEach(p => {
          const cat = CAT_KEYS[p.seriesIndex];
          const cs = C()[lessonK].categoryStats[cat];
          html += `<br/><span style="color:${CAT_COLORS[cat]}">■</span> ${CAT_LABELS[cat]}: ${p.value}% (${cs.count}个环节, 共流失${cs.totalLoss}人)`;
        });
        return html;
      }},
    legend: { data: CAT_KEYS.map(k => CAT_LABELS[k]), textStyle: { color: '#94a3b8' }, top: 4 },
    grid: { left: 60, right: 40, top: 48, bottom: 50 },
    xAxis: { type: 'category', data: keys.map(k => `第${k}课`), axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: { type: 'value', axisLabel: { color: '#94a3b8', formatter: '{value}%' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    series: CAT_KEYS.map(cat => ({
      name: CAT_LABELS[cat], type: 'bar', barWidth: 28,
      data: keys.map(k => C()[k].categoryStats[cat] ? C()[k].categoryStats[cat].avgLossRate : 0),
      itemStyle: { color: CAT_COLORS[cat], borderRadius: [4,4,0,0] },
      label: { show: true, position: 'top', formatter: p => { const cs = C()[keys[p.dataIndex]].categoryStats[cat]; return p.value + '%\n' + cs.totalLoss + '人'; },
        color: '#94a3b8', fontSize: 9, fontFamily: 'JetBrains Mono', lineHeight: 14 },
    }))
  }); ch.resize();
}

// ── Compare Mode ──
function renderCompare(container) {
  const skuKeys = Object.keys(SKUS);
  if (skuKeys.length < 2) {
    const notice = document.createElement('div');
    notice.className = 'compare-notice';
    notice.innerHTML = `当前仅有 <b>1</b> 个数据集（${S().label}）。<br>请在 <code>SKU_REGISTRY</code> 中添加更多SKU数据后即可开启交叉对比分析。<br><br>
      <span style="color:var(--text-muted)">示例：添加 <code>'spring06_low'</code> 低年级数据后，可对比高低年级的完课率、流失模式差异。</span>`;
    container.appendChild(notice);
    return;
  }
  // TODO: multi-SKU compare charts
  const notice = document.createElement('div');
  notice.className = 'compare-notice';
  notice.innerHTML = `交叉对比模式已开启，共 ${skuKeys.length} 个数据集可参与对比。<br>此处将展示各SKU的完课率、流失率、关卡难度等维度的横向比较图表。`;
  container.appendChild(notice);
}

// ── Helpers ──
function mkPanel(title, desc, dotColor) {
  const p = document.createElement('div'); p.className = 'panel';
  p.innerHTML = `<div class="panel-title"><span class="dot" style="background:${dotColor}"></span>${title}</div><div class="panel-desc">${desc}</div>`;
  return p;
}

function guess(ch) {
  if (ch.salesImpacted) return '第4课销售干扰期，流失属正常业务场景';
  if (ch.contentType === 'PROJECT' && ch.innerLossRate > 1) return '关卡难度偏高或操作步骤过多，建议增加引导';
  if (ch.contentType === 'PROJECT') return '关卡环节天然流失，关注是否卡在特定步骤';
  if (ch.chapterName.includes('剧情') && ch.index <= 2) return '开场剧情流失，可能因加载等待';
  if (ch.chapterName.includes('剧情')) return '剧情过渡流失，节奏感可能不足';
  if (ch.chapterName.includes('总结')) return '课末总结流失，学生可能提前离开';
  if (ch.contentType === 'VIDEO' && ch.innerLossRate > 0.5) return '视频时长或信息密度偏高';
  return '建议结合行为日志进一步定位';
}

// ── Init ──
renderAll();
window.addEventListener('resize', () => Object.values(charts).forEach(c => { try { c.resize(); } catch(e) {} }));
</script>

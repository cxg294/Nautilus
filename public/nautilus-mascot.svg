<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100%" height="100%">
  <!-- Nautilus Mascot SVG Hand-Coded Logo -->
  <g transform="translate(8, 15)">
    <!-- Propeller Base -->
    <path d="M 18 30 L 12 30 L 12 40 L 18 40" fill="none" stroke="#0F172A" stroke-width="4" stroke-linejoin="round"/>
    <!-- Propeller Blades -->
    <path d="M 12 35 C 4 25, 4 45, 12 35" fill="none" stroke="#0F172A" stroke-width="4"/>
    <ellipse cx="8" cy="28" rx="3" ry="8" transform="rotate(35 8 28)" fill="#0F172A"/>
    <ellipse cx="8" cy="42" rx="3" ry="8" transform="rotate(-35 8 42)" fill="#0F172A"/>
    <!-- Body -->
    <rect x="18" y="20" width="56" height="30" rx="15" fill="none" stroke="#0F172A" stroke-width="5"/>
    <!-- Cabin -->
    <path d="M 38 20 L 38 10 A 5 5 0 0 1 43 5 L 53 5 A 5 5 0 0 1 58 10 L 58 20 Z" fill="#FFFFFF" stroke="#0F172A" stroke-width="5" stroke-linejoin="round"/>
    <!-- Periscope -->
    <path d="M 48 5 L 48 -5 A 4 4 0 0 1 52 -9 L 58 -9" fill="none" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <!-- Periscope Lens -->
    <circle cx="61" cy="-9" r="3.5" fill="#0F172A"/>
    <!-- Main Windows -->
    <circle cx="32" cy="35" r="5.5" fill="#14B8A6" stroke="#0F172A" stroke-width="3.5"/>
    <circle cx="48" cy="35" r="5.5" fill="#14B8A6" stroke="#0F172A" stroke-width="3.5"/>
    <circle cx="64" cy="35" r="5.5" fill="#14B8A6" stroke="#0F172A" stroke-width="3.5"/>
    <!-- Cabin Door and Window -->
    <path d="M 43 20 L 43 12 A 1 1 0 0 1 45 10 L 45 20" fill="none" stroke="#0F172A" stroke-width="2"/>
    <circle cx="52" cy="14" r="3" fill="#14B8A6" stroke="#0F172A" stroke-width="2.5"/>
  </g>
</svg>
